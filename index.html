<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excuse Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caprasimo&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <img class="bg-image" src="/background.png" alt="" aria-hidden="true">

    <main class="layout">
        <section class="title-panel" aria-label="Title section">
            <h1>Excuse Generator</h1>
            <p class="subtitle">No excuses, just better excuses.</p>
        </section>

        <section class="card" aria-label="Excuse generator card">
            <p id="excuse-text" class="excuse-text">Press GENERATE to get your excuse.</p>
            <button id="generate-btn" type="button">GENERATE</button>
        </section>
    </main>

    <script src="excuse-generator.js" defer></script>
</body>
</html>
